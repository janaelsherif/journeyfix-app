services:
  postgres:
    image: postgres:16-alpine
    container_name: journeyfix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: journeyfix
    ports:
      - "5432:5432"
    volumes:
      - journeyfix_pgdata:/var/lib/postgresql/data

volumes:
  journeyfix_pgdata:
